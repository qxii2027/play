<script>
const canvas = document.getElementById('gameCanvas'); const ctx = canvas.getContext('2d'); canvas.width = window.innerWidth; canvas.height = window.innerHeight;
const WEAPONS = { default: { name: '标准', fireRate: 8, bulletCount: 1, damage: 1 }, shotgun: { name: '霰弹枪', fireRate: 2, bulletCount: 6, spread: 0.5, damage: 0.7 }, machinegun: { name: '速射机枪', fireRate: 15, bulletCount: 1, spread: 0.2, damage: 0.8 } };
const ENEMY_TYPES = { CHASER: { RADIUS: 22, SPEED: 2, HEALTH: 3, XP: 10, COLOR: '#6A4C93' }, SHOOTER: { RADIUS: 18, SPEED: 1.5, HEALTH: 2, XP: 15, FIRE_RATE: 0.6, COLOR: '#D35400' } };

const PLAYER_SHAPES = { triangle: (ctx, radius, color) => { ctx.fillStyle = color; ctx.beginPath(); ctx.moveTo(radius, 0); ctx.lineTo(-radius / 2, -radius / 1.5); ctx.lineTo(-radius / 2, radius / 1.5); ctx.closePath(); ctx.fill(); }, square: (ctx, radius, color) => { ctx.fillStyle = color; ctx.fillRect(-radius * 0.7, -radius * 0.7, radius * 1.4, radius * 1.4); }, star: (ctx, radius, color) => { ctx.fillStyle = color; ctx.beginPath(); for (let i = 0; i < 5; i++) { ctx.lineTo(Math.cos((18 + i * 72) * Math.PI / 180) * radius, -Math.sin((18 + i * 72) * Math.PI / 180) * radius); ctx.lineTo(Math.cos((54 + i * 72) * Math.PI / 180) * radius * 0.5, -Math.sin((54 + i * 72) * Math.PI / 180) * radius * 0.5); } ctx.closePath(); ctx.fill(); } };
let keys = {}, mouse = { x: 0, y: 0, down: false }; let entities, player, particles = [], powerUps = []; let score, gameTime, wave, gameState = 'start', lastTime = 0; let sfxVolume = 0.8, bgmVolume = 0.5; let tempMetaCurrency = 0; let metaData = { currency: 0, upgrades: { health: { level: 0, cost: 10, costIncrease: 1.5, value: 5, name: "最大生命" }, speed: { level: 0, cost: 15, costIncrease: 1.8, value: 0.02, name: "移动速度" }, xpRate: { level: 0, cost: 20, costIncrease: 2, value: 0.05, name: "经验获取" }, luck: { level: 0, cost: 30, costIncrease: 2.5, value: 0.05, name: "幸运值" } } };
function loadMetaData() { const saved = localStorage.getItem('daylightRaidMeta'); if (saved) metaData = JSON.parse(saved); } function saveMetaData() { localStorage.setItem('daylightRaidMeta', JSON.stringify(metaData)); }
let audioCtx; function initAudio() { if (!audioCtx) try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){} }

class Entity { constructor(x, y, radius) { this.x = x; this.y = y; this.radius = radius; this.active = true; } draw(ctx) { ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fill(); } }
class Player extends Entity { constructor(x, y) { super(x, y, 20); this.baseSpeed = 3.5; this.baseHealth = 100; this.color = '#34568B'; this.shield = 0; this.maxShield = 50; this.xp = 0; this.level = 1; this.xpToLevel = 100; this.angle = 0; this.invincibleTimer = 0; this.fireCooldown = 0; this.upgrades = {}; this.weapons = []; this.mainWeaponLevel = 0; this.drawShapeFunc = PLAYER_SHAPES.triangle; this.speed = this.baseSpeed * (1 + metaData.upgrades.speed.level * metaData.upgrades.speed.value); this.maxHealth = this.baseHealth + (metaData.upgrades.health.level * metaData.upgrades.health.value); this.health = this.maxHealth; this.pickupRadius = 50; this.damageMultiplier = 1; this.shieldFlashTimer = 0; this.currentWeapon = WEAPONS.default; this.tempWeaponTimer = 0; } update(dt) { if (this.invincibleTimer > 0) this.invincibleTimer -= dt; if (this.shieldFlashTimer > 0) this.shieldFlashTimer -= dt; if (this.fireCooldown > 0) this.fireCooldown -= dt; if (this.tempWeaponTimer > 0) { this.tempWeaponTimer -= dt; if(this.tempWeaponTimer <= 0) this.currentWeapon = WEAPONS.default; } if ((mouse.down || keys[' ']) && this.fireCooldown <= 0) this.shoot(); this.weapons.forEach(w => { w.cooldown -= dt; if (w.cooldown <= 0) this.fireAutoWeapon(w); }); let moveX = (keys['d'] || keys['arrowright'] ? 1 : 0) - (keys['a'] || keys['arrowleft'] ? 1 : 0); let moveY = (keys['s'] || keys['arrowdown'] ? 1 : 0) - (keys['w'] || keys['arrowup'] ? 1 : 0); const mag = Math.sqrt(moveX * moveX + moveY * moveY); if (mag > 0) { this.x += (moveX / mag) * this.speed; this.y += (moveY / mag) * this.speed; } this.x = Math.max(this.radius, Math.min(canvas.width - this.radius, this.x)); this.y = Math.max(this.radius, Math.min(canvas.height - this.radius, this.y)); this.angle = Math.atan2(mouse.y - this.y, mouse.x - this.x); } shoot() { const weapon = this.currentWeapon; playSound('shoot'); this.fireCooldown = 1 / weapon.fireRate; for (let i = 0; i < weapon.bulletCount; i++) { const angle = this.angle + (Math.random() - 0.5) * (weapon.spread || 0.1); entities.bullets.push(new Bullet(this.x, this.y, angle, true, { damage: weapon.damage })); } } fireAutoWeapon(weapon) { const target = findNearestEnemy(this.x, this.y); const level = this.upgrades[weapon.key]?.level || 1; switch(weapon.key) { case 'magicMissile': if(target){ weapon.cooldown = 2.5 - level * 0.3; const damage = (UPGRADE_POOL.magicMissile.baseDamage + (level - 1) * 1.5) * this.damageMultiplier; const angle = Math.atan2(target.y - this.y, target.x - this.x); entities.bullets.push(new Bullet(this.x, this.y, angle, true, { tracking: true, color: '#9400D3', damage: damage })); } break; case 'guardianAura': weapon.cooldown = 0.2; const radius = 60 + level * 10; const damage = UPGRADE_POOL.guardianAura.baseDamage * level * this.damageMultiplier; entities.enemies.forEach(e => { if (e.active && Math.hypot(this.x - e.x, this.y - e.y) < radius) { e.takeDamage(damage); playSound('auraHit'); particles.push(new Particle(e.x, e.y, 3, 'rgba(135, 206, 250, 0.8)', 0.2)); }}); break; } } addXp(amount) { this.xp += amount * (1 + metaData.upgrades.xpRate.level * metaData.upgrades.xpRate.value); if (this.xp >= this.xpToLevel) { this.xp -= this.xpToLevel; this.level++; this.xpToLevel = Math.floor(this.xpToLevel * 1.2); gameState = 'levelUp'; createLevelUpScreen(getUpgradeChoices(this)); } } takeDamage(amount){ if(this.invincibleTimer > 0) return; if(this.shield > 0) { this.shield -= amount; playSound('shieldHit'); this.shieldFlashTimer = 0.2; if(this.shield < 0) { this.health += this.shield; this.shield = 0; } } else { this.health -= amount; playSound('hit'); } if(this.health <= 0) { this.health = 0; endGame(); } this.invincibleTimer = 1.5; } draw(ctx) { if (this.invincibleTimer > 0 && Math.floor(gameTime * 20) % 2 === 0) return; if (this.upgrades.guardianAura) { const level = this.upgrades.guardianAura.level; const radius = 60 + level * 10; ctx.fillStyle = `rgba(135, 206, 250, ${0.1 + level * 0.05})`; ctx.beginPath(); ctx.arc(this.x, this.y, radius, 0, Math.PI * 2); ctx.fill(); } if (this.shield > 0) { ctx.strokeStyle = `rgba(52, 152, 219, ${this.shieldFlashTimer > 0 ? 1 : 0.5})`; ctx.lineWidth = 2 + (this.shield / this.maxShield) * 4; ctx.beginPath(); ctx.arc(this.x, this.y, this.radius + 8, 0, Math.PI * 2); ctx.stroke(); } ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.angle); this.drawShapeFunc(ctx, this.radius, this.color); ctx.restore(); } }
class Enemy extends Entity { constructor(x, y, type, isElite=false) { super(x, y, type.RADIUS * (isElite ? 1.5 : 1)); this.isElite = isElite; this.color = isElite ? '#F1C40F' : type.COLOR; this.speed = type.SPEED * (1 + wave.number / 20) * (isElite ? 0.8 : 1); this.health = type.HEALTH * (1 + Math.floor(wave.number/5)) * (isElite ? 10 : 1); this.xp = type.XP * (isElite ? 5 : 1); this.type = type; this.fireCooldown = 1 / (this.type.FIRE_RATE || 1); } update(dt, player) { const angleToPlayer = Math.atan2(player.y - this.y, player.x - this.x); if (this.type === ENEMY_TYPES.SHOOTER) { const dist = Math.hypot(this.x - player.x, this.y - player.y); if (dist > 300) { this.x += Math.cos(angleToPlayer) * this.speed; this.y += Math.sin(angleToPlayer) * this.speed; } this.fireCooldown -= dt; if (this.fireCooldown <= 0) { entities.bullets.push(new Bullet(this.x, this.y, angleToPlayer, false)); this.fireCooldown = 1 / this.type.FIRE_RATE; } } else { this.x += Math.cos(angleToPlayer) * this.speed; this.y += Math.sin(angleToPlayer) * this.speed; } } takeDamage(amount) { this.health -= amount; if(this.health <= 0) this.active = false; } }
class Bullet extends Entity { constructor(x, y, angle, isPlayer, props = {}) { super(x, y, 5); this.isPlayer = isPlayer; this.color = props.color || (isPlayer ? '#00BFFF' : '#FF007F'); const speed = isPlayer ? 8 : 5; this.vx = Math.cos(angle) * speed; this.vy = Math.sin(angle) * speed; this.tracking = props.tracking || false; this.damage = props.damage || (isPlayer ? player.currentWeapon.damage * player.damageMultiplier : 10); } update(dt) { if (this.tracking) { const target = findNearestEnemy(this.x, this.y); if (target) { const angle = Math.atan2(target.y-this.y, target.x-this.x); const speed = Math.hypot(this.vx, this.vy); this.vx += (Math.cos(angle)*speed - this.vx)*0.1; this.vy += (Math.sin(angle)*speed - this.vy)*0.1; }} this.x += this.vx; this.y += this.vy; if (this.x<0||this.x>canvas.width||this.y<0||this.y>canvas.height) this.active=false; } }
class ExperienceOrb extends Entity { constructor(x, y, value) { super(x, y, 5); this.value = value; this.color = '#F1C40F'; } update(dt, player) { const dist = Math.hypot(this.x - player.x, this.y - player.y); if (dist < player.pickupRadius) { const angle = Math.atan2(player.y - this.y, player.x - this.x); this.x += Math.cos(angle) * 10; this.y += Math.sin(angle) * 10; if (dist < player.radius) { player.addXp(this.value); this.active = false; } } } }
class PowerUp extends Entity { constructor(x, y) { const types = ['HEALTH', 'SHIELD', 'WEAPON']; const type = types[Math.floor(Math.random() * types.length)]; super(x, y, 12); this.type = type; this.life = 10; switch(type) { case 'HEALTH': this.color = '#2ECC71'; break; case 'SHIELD': this.color = '#3498DB'; break; case 'WEAPON': this.color = '#F1C40F'; break; } } update(dt) { this.life -= dt; if(this.life <= 0) this.active = false; } apply(player) { playSound('powerup'); switch(this.type) { case 'HEALTH': player.health = Math.min(player.maxHealth, player.health + 25); break; case 'SHIELD': player.shield = player.maxShield; break; case 'WEAPON': const tempWeapons = ['shotgun', 'machinegun']; player.currentWeapon = WEAPONS[tempWeapons[Math.floor(Math.random() * tempWeapons.length)]]; player.tempWeaponTimer = 15; break; } this.active = false; } }
class Particle extends Entity { constructor(x,y,r,c,l){super(x,y,r);this.color=c;this.life=l;this.initialLife=l;this.vx=(Math.random()-.5)*5;this.vy=(Math.random()-.5)*5}update(dt){this.x+=this.vx;this.y+=this.vy;this.life-=dt;if(this.life<=0)this.active=false}draw(ctx){ctx.save();ctx.globalAlpha=this.life/this.initialLife;ctx.fillStyle=this.color;ctx.beginPath();ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);ctx.fill();ctx.restore()}}
function initGame() { keys = {}; mouse.down = false; entities = { enemies: [], bullets: [], orbs: [], powerups: [] }; particles = []; player = new Player(canvas.width / 2, canvas.height / 2); const savedShape = document.querySelector('#shape-selector .active').dataset.shape; player.drawShapeFunc = PLAYER_SHAPES[savedShape]; score = 0; gameTime = 0; tempMetaCurrency = 0; wave = { number: 0, timer: 3, isSpawning: false }; WEAPONS.default.fireRate = 8; WEAPONS.default.bulletCount = 1; WEAPONS.default.damage = 1; }
function update(dt) { gameTime += dt; if (wave.timer > 0) { wave.timer -= dt; if (wave.timer <= 0) nextWave(); } else if (!wave.isSpawning && entities.enemies.length === 0) { wave.timer = 3; } if(player) player.update(dt); if (!player || !player.active) return; Object.values(entities).flat().forEach(e => e.update(dt, player)); handleCollisions(); for (const key in entities) { entities[key] = entities[key].filter(e => e.active); } }
function handleCollisions() { for (const b of entities.bullets) { if (b.isPlayer && b.active) { for (const e of entities.enemies) { if (e.active && Math.hypot(b.x-e.x, b.y-e.y) < b.radius+e.radius) { b.active = false; e.takeDamage(b.damage); playSound('enemyHit'); if (!e.active) { score += e.xp; entities.orbs.push(new ExperienceOrb(e.x, e.y, e.xp)); if(e.isElite) tempMetaCurrency++; if(Math.random() < 0.1) entities.powerups.push(new PowerUp(e.x, e.y)); } break; } } } else if (!b.isPlayer && b.active) { if(player.active && Math.hypot(b.x - player.x, b.y - player.y) < b.radius + player.radius) { b.active = false; player.takeDamage(10); } } } for (const e of entities.enemies) { if (e.active && player.active && Math.hypot(e.x - player.x, e.y - player.y) < e.radius + player.radius) { player.takeDamage(20); e.active = false; } } for (const p of entities.powerups) { if (p.active && player.active && Math.hypot(p.x - player.x, p.y - player.y) < p.radius + player.radius) { p.apply(player); } } }
function render() { ctx.fillStyle = '#F0F4F8'; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.save(); ctx.shadowColor = 'rgba(0,0,0,0.2)'; ctx.shadowBlur = 5; ctx.shadowOffsetX = 3; ctx.shadowOffsetY = 3; if ((gameState === 'playing' || gameState === 'paused' || gameState === 'levelUp') && player) { player.draw(ctx); Object.values(entities).flat().forEach(e => e.draw(ctx)); } ctx.restore(); if (gameState === 'playing' || gameState === 'paused') drawUI(); }
function drawUI() { if(!player) return; document.getElementById('meta-currency-display').innerText = '核心: '+tempMetaCurrency; ctx.fillStyle = '#333'; ctx.font = '24px Segoe UI'; ctx.textAlign = 'left'; ctx.fillText('分数: '+score, 20, 40); ctx.fillText('波数: '+wave.number, 20, 70); ctx.fillStyle = '#00000022'; ctx.fillRect(20, canvas.height - 40, 200, 20); ctx.fillStyle = '#E74C3C'; ctx.fillRect(20, canvas.height - 40, (player.health / player.maxHealth) * 200, 20); if(player.shield > 0) { ctx.fillStyle = '#3498DBaa'; ctx.fillRect(20, canvas.height-40, (player.shield/player.maxShield)*200, 20); } ctx.fillStyle = '#00000022'; ctx.fillRect(20, canvas.height - 70, 200, 10); ctx.fillStyle = '#F1C40F'; ctx.fillRect(20, canvas.height - 70, (player.xp / player.xpToLevel) * 200, 10); }
function gameLoop(timestamp) { if (!lastTime) lastTime = timestamp; const dt = (timestamp - lastTime) / 1000; lastTime = timestamp; if (gameState === 'playing') update(dt); render(); requestAnimationFrame(gameLoop); }
function startGame() { const allScreens = document.querySelectorAll('.screen'); allScreens.forEach(s => s.style.display = 'none'); initAudio(); initGame(); gameState = 'playing'; document.getElementById('settings-button').style.display = 'block'; document.getElementById('meta-currency-display').style.display = 'block'; }
function endGame() { gameState = 'gameOver'; metaData.currency += tempMetaCurrency; saveMetaData(); const screen = document.getElementById('gameOverScreen'); screen.innerHTML = '<h1>作战失败</h1><p>最终得分: '+score+' | 到达波数: '+wave.number+'</p><p>获得记忆核心: '+tempMetaCurrency+'</p><button class="button restart">再来一次</button><button class="button main-menu">返回主菜单</button>'; screen.style.display = 'flex'; screen.querySelector('.restart').addEventListener('click', startGame); screen.querySelector('.main-menu').addEventListener('click', () => { screen.style.display = 'none'; document.getElementById('startScreen').style.display = 'flex'; }); document.getElementById('settings-button').style.display = 'none'; document.getElementById('meta-currency-display').style.display = 'none'; }
function findNearestEnemy(x,y) { let nearest = null; let minDist = Infinity; for (const e of entities.enemies) { if (!e.active) continue; const dist = Math.hypot(x-e.x, y-e.y); if(dist < minDist) { minDist = dist; nearest = e; }} return nearest; }

let score=0, best=localStorage.getItem('best')||0, speed=6, frame=0, gameOver=false;
document.getElementById('best').textContent='最高分: '+best;

class Deco {
  constructor(src,y,speed){ this.x=Math.random()*cvs.width; this.y=y; this.speed=speed; this.w=Math.random()*60+40; this.h=this.w*0.6; this.src=src; }

}

for(let i=0;i<6;i++){clouds.push(new Deco('#fff',Math.random()*cvs.height/2,1))}
for(let i=0;i<30;i++){stars.push(new Deco('#fffa',Math.random()*cvs.height,Math.random()*2+0.5))}

const player={
  x:120, y:cvs.height-60, w:30, h:30, vy:0, onGround:true, jumps:0, sliding:false, slideTimer:0,
  update(){

    this.y+=this.vy;
    if(this.y>=cvs.height-this.h-5){ this.y=cvs.height-this.h-5; this.vy=0; this.onGround=true; this.jumps=0; }
    if(this.sliding){ if(--this.slideTimer<=0){ this.sliding=false; this.h=30; this.y=cvs.height-this.h-5; } }
  },
  jump(){ if(this.jumps<2){ this.vy=this.jumps?DOUBLE:JUMP; this.onGround=false; this.jumps++; } },
  slide(){ if(this.onGround && !this.sliding){ this.sliding=true; this.slideTimer=SLIDE_DUR; this.h=SLIDE_H; this.y=cvs.height-this.h-5; } },
  draw(){ ctx.fillStyle='#0f0'; ctx.fillRect(this.x,this.y,this.w,this.h); }
};

const obstacles=[];
function spawn(){ const high=Math.random()<0.5; obstacles.push({ x:cvs.width, y:high?cvs.height-80:cvs.height-40, w:30, h:high?50:30, color:'#f00' }); }

function loop(){
  if(gameOver)return;
  ctx.clearRect(0,0,cvs.width,cvs.height);
  stars.forEach(s=>{s.update();s.draw()}); clouds.forEach(c=>{c.update();c.draw()});

  }
  frame++; requestAnimationFrame(loop);
}

  document.getElementById('finalScore').textContent='得分：'+score; document.getElementById('gameOver').style.display='block';
}
function restart(){

  player.y=cvs.height-65; player.vy=0; player.jumps=0; player.sliding=false; player.h=30;
  document.getElementById('score').textContent='分数: 0'; document.getElementById('gameOver').style.display='none'; loop();
}

document.addEventListener('keydown',e=>{
  if(gameOver)return;
  if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();player.jump();}
  if(e.code==='ArrowDown'){e.preventDefault();player.slide();}
});
document.addEventListener('touchstart',e=>{
  if(gameOver)return;
  const y=e.touches[0].clientY;
  y<cvs.height/2?player.jump():player.slide();
});

loop();
</script>
</body>
</html>
